<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>What the Shingle</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --slate: #1c2329; --slate-mid: #2d3a45; --slate-light: #3e5060;
    --gold: #c9a84c; --gold-light: #e2c97e;
    --cream: #f5f0e8; --cream-dark: #e8e0d0;
    --white: #ffffff; --red: #c0392b; --green: #27ae60; --muted: #8a9aa8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--slate); min-height: 100vh; }

  header { background: var(--slate); padding: 20px 32px; display: flex; align-items: center; gap: 14px; border-bottom: 2px solid var(--gold); }
  .brand-name { font-family: 'DM Serif Display', serif; font-size: 1.5rem; color: var(--white); }
  .brand-name span { color: var(--gold); }
  .brand-tagline { font-size: 0.7rem; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 2px; }

  main { max-width: 860px; margin: 0 auto; padding: 32px 18px 60px; display: flex; flex-direction: column; gap: 18px; }

  .screen { display: none; flex-direction: column; gap: 16px; }
  .screen.active { display: flex; }

  /* UPLOAD */
  #uploadArea {
    background: var(--white); border: 2px dashed var(--cream-dark); border-radius: 12px;
    padding: 56px 24px; text-align: center; cursor: pointer; transition: border-color 0.2s, background 0.2s;
  }
  #uploadArea:hover { border-color: var(--gold); background: #fffdf7; }
  .upload-icon { width: 54px; height: 54px; margin: 0 auto 14px; background: var(--cream); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
  .upload-icon svg { width: 26px; height: 26px; stroke: var(--gold); fill: none; }
  .upload-title { font-family: 'DM Serif Display', serif; font-size: 1.35rem; color: var(--slate); margin-bottom: 8px; }
  .upload-sub { font-size: 0.85rem; color: var(--muted); line-height: 1.5; }

  /* PREVIEW */
  .preview-card { background: var(--white); border-radius: 12px; overflow: hidden; display: flex; box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
  .preview-img-col { width: 230px; flex-shrink: 0; background: var(--slate-mid); display: flex; align-items: center; justify-content: center; padding: 16px; }
  .preview-img-col img { width: 100%; max-height: 190px; object-fit: contain; border-radius: 5px; }
  .preview-info-col { flex: 1; padding: 26px; display: flex; flex-direction: column; gap: 12px; justify-content: center; }
  .preview-info-col h3 { font-family: 'DM Serif Display', serif; font-size: 1.15rem; }
  .preview-info-col p { font-size: 0.85rem; color: var(--muted); }
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }

  .btn-gold { display: inline-flex; align-items: center; gap: 8px; background: var(--gold); color: var(--slate); border: none; border-radius: 8px; padding: 12px 22px; font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 0.88rem; cursor: pointer; transition: background 0.2s; }
  .btn-gold:hover { background: var(--gold-light); }
  .btn-ghost { display: inline-flex; align-items: center; background: none; color: var(--muted); border: 1px solid var(--cream-dark); border-radius: 8px; padding: 12px 18px; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; cursor: pointer; transition: border-color 0.2s, color 0.2s; }
  .btn-ghost:hover { border-color: var(--slate-light); color: var(--slate); }

  .error-box { background: #fff5f5; border: 1px solid rgba(192,57,43,0.25); border-radius: 9px; padding: 16px 20px; color: var(--red); font-size: 0.85rem; line-height: 1.55; }

  /* LOADING */
  .loading-card { background: var(--white); border-radius: 12px; padding: 52px 24px; text-align: center; }
  .spinner { width: 38px; height: 38px; border: 3px solid var(--cream-dark); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 14px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-label { font-family: 'DM Serif Display', serif; font-size: 1.05rem; }
  .loading-sub { font-size: 0.78rem; color: var(--muted); margin-top: 5px; }

  /* RESULTS */
  .result-header { background: var(--slate); border-radius: 12px; padding: 26px 28px; display: flex; align-items: flex-start; justify-content: space-between; gap: 18px; flex-wrap: wrap; }
  .r-name { font-family: 'DM Serif Display', serif; font-size: 1.65rem; color: var(--white); line-height: 1.2; }
  .r-mfr { font-size: 0.78rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 4px; }
  .conf-row { margin-top: 12px; display: flex; align-items: center; gap: 10px; }
  .conf-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .conf-track { flex: 1; height: 4px; background: var(--slate-light); border-radius: 2px; overflow: hidden; }
  .conf-fill { height: 100%; background: var(--gold); border-radius: 2px; transition: width 1s ease; width: 0%; }
  .conf-pct { font-size: 0.78rem; font-weight: 600; color: var(--gold); min-width: 32px; text-align: right; }

  .status-badge { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 100px; font-size: 0.78rem; font-weight: 600; flex-shrink: 0; }
  .status-badge.active { background: rgba(39,174,96,0.15); color: #4caf76; border: 1px solid rgba(39,174,96,0.3); }
  .status-badge.discontinued { background: rgba(192,57,43,0.15); color: #e05c4a; border: 1px solid rgba(192,57,43,0.3); }
  .status-badge.limited { background: rgba(201,168,76,0.15); color: var(--gold-light); border: 1px solid rgba(201,168,76,0.3); }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; }
  .status-badge.active .status-dot { background: #4caf76; }
  .status-badge.discontinued .status-dot { background: #e05c4a; }
  .status-badge.limited .status-dot { background: var(--gold-light); }

  .info-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(185px, 1fr)); gap: 11px; }
  .info-card { background: var(--white); border-radius: 9px; padding: 15px 17px; border: 1px solid var(--cream-dark); }
  .info-label { font-size: 0.67rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 5px; }
  .info-val { font-size: 0.88rem; font-weight: 600; color: var(--slate); line-height: 1.4; }

  .notes-card { background: var(--white); border-radius: 9px; padding: 18px 20px; border-left: 3px solid var(--gold); }
  .notes-card h4 { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--gold); margin-bottom: 7px; }
  .notes-card p { font-size: 0.87rem; color: var(--slate-mid); line-height: 1.65; }

  .alt-card { background: var(--white); border-radius: 9px; padding: 18px 20px; border: 1px solid var(--cream-dark); }
  .alt-card h4 { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 11px; }
  .alt-item { display: flex; align-items: center; gap: 11px; padding: 9px 0; border-bottom: 1px solid var(--cream-dark); }
  .alt-item:last-child { border-bottom: none; }
  .alt-swatch { width: 26px; height: 26px; border-radius: 5px; flex-shrink: 0; border: 1px solid var(--cream-dark); }
  .alt-name { font-size: 0.85rem; font-weight: 600; color: var(--slate); }
  .alt-reason { font-size: 0.73rem; color: var(--muted); margin-top: 1px; }
  .alt-avail { font-size: 0.73rem; font-weight: 600; color: var(--green); margin-left: auto; flex-shrink: 0; }

  @media (max-width: 560px) {
    .preview-card { flex-direction: column; }
    .preview-img-col { width: 100%; height: 170px; }
    .result-header { flex-direction: column; }
  }
</style>
</head>
<body>

<header>
  <svg width="36" height="36" viewBox="0 0 40 40" fill="none">
    <rect width="40" height="40" rx="8" fill="#2d3a45"/>
    <path d="M6 22L20 10L34 22" stroke="#c9a84c" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M10 22v10h20V22" stroke="#c9a84c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M16 32v-6h8v6" stroke="#c9a84c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
  <div>
    <div class="brand-name">What the <span>Shingle</span></div>
    <div class="brand-tagline">AI Identification for Roofing Pros</div>
  </div>
</header>

<main>

  <!-- UPLOAD SCREEN -->
  <div id="sUpload" class="screen active">
    <label id="uploadArea" for="fileInput" style="display:block;cursor:pointer;">
      <div class="upload-icon">
        <svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
      </div>
      <div class="upload-title">Click to upload a shingle photo</div>
      <div class="upload-sub">On-site snap or camera roll — JPG, PNG, HEIC</div>
    </label>
    <input type="file" id="fileInput" accept="image/*" style="display:none">
  </div>

  <!-- PREVIEW SCREEN -->
  <div id="sPreview" class="screen">
    <div class="preview-card">
      <div class="preview-img-col"><img id="previewImg" src="" alt="Shingle"></div>
      <div class="preview-info-col">
        <div>
          <h3>Ready to identify</h3>
          <p>Photo loaded. Hit the button to run AI analysis.</p>
        </div>
        <div class="btn-row">
          <button class="btn-gold" id="analyzeBtn">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            Identify Shingle
          </button>
          <label class="btn-ghost" for="fileInput2" style="cursor:pointer;">Change photo</label>
          <input type="file" id="fileInput2" accept="image/*" style="display:none">
        </div>
      </div>
    </div>
    <div id="errBox" class="error-box" style="display:none"></div>
  </div>

  <!-- LOADING SCREEN -->
  <div id="sLoading" class="screen">
    <div class="loading-card">
      <div class="spinner"></div>
      <div class="loading-label">Analyzing your shingle…</div>
      <div class="loading-sub">Checking manufacturer databases and product history</div>
    </div>
  </div>

  <!-- RESULTS SCREEN -->
  <div id="sResults" class="screen">
    <div class="result-header">
      <div style="flex:1">
        <div class="r-name" id="rName"></div>
        <div class="r-mfr" id="rMfr"></div>
        <div class="conf-row">
          <span class="conf-label">Match confidence</span>
          <div class="conf-track"><div class="conf-fill" id="confFill"></div></div>
          <span class="conf-pct" id="confPct"></span>
        </div>
      </div>
      <div id="statusBadge" class="status-badge"></div>
    </div>
    <div class="info-grid" id="infoGrid"></div>
    <div class="notes-card" id="notesCard" style="display:none"><h4>Field Notes</h4><p id="notesText"></p></div>
    <div class="alt-card" id="altCard" style="display:none"><h4>Compatible Alternatives</h4><div id="altList"></div></div>
    <button class="btn-ghost" id="resetBtn">← Analyze another shingle</button>
  </div>

</main>

<script>
  let b64 = null;

  const screens = { upload: 'sUpload', preview: 'sPreview', loading: 'sLoading', results: 'sResults' };
  function show(name) {
    Object.values(screens).forEach(id => document.getElementById(id).classList.remove('active'));
    document.getElementById(screens[name]).classList.add('active');
  }

  function compress(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        const MAX = 1024;
        let w = img.width, h = img.height;
        if (w > MAX || h > MAX) {
          if (w >= h) { h = Math.round(h * MAX / w); w = MAX; }
          else { w = Math.round(w * MAX / h); h = MAX; }
        }
        const c = document.createElement('canvas');
        c.width = w; c.height = h;
        c.getContext('2d').drawImage(img, 0, 0, w, h);
        const url = c.toDataURL('image/jpeg', 0.82);
        b64 = url.split(',')[1];
        document.getElementById('previewImg').src = url;
        document.getElementById('errBox').style.display = 'none';
        show('preview');
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  }

  document.getElementById('fileInput').addEventListener('change', function() { compress(this.files[0]); this.value=''; });
  document.getElementById('fileInput2').addEventListener('change', function() { compress(this.files[0]); this.value=''; });
  document.getElementById('resetBtn').addEventListener('click', () => { b64 = null; show('upload'); });

  document.getElementById('analyzeBtn').addEventListener('click', async () => {
    if (!b64) return;
    show('loading');

    const sys = `You are an expert roofing material specialist. Identify the shingle and respond ONLY with a raw JSON object. No markdown, no backticks, no text before or after. Just JSON.

Schema:
{
  "productName": string,
  "manufacturer": string,
  "colorStyle": string,
  "shingleType": string,
  "material": string,
  "dimensions": string or null,
  "warrantyOriginal": string or null,
  "weightPerSquare": string or null,
  "windRating": string or null,
  "fireRating": string or null,
  "availability": "active" | "discontinued" | "limited",
  "discontinuedYear": string or null,
  "whereToBuy": string,
  "confidence": number (0-100),
  "fieldNotes": string,
  "alternatives": [{ "productName": string, "manufacturer": string, "reason": string, "colorHex": string, "available": boolean }]
}`;

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-api-key': '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', 'anthropic-version': ,2023-06-01' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: sys,
          messages: [{ role: 'user', content: [
            { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: b64 } },
            { type: 'text', text: 'Identify this shingle. Return only the JSON object.' }
          ]}]
        })
      });

      const data = await res.json();
      console.log('API response:', JSON.stringify(data).substring(0, 600));

      if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));

      const text = (data.content || []).map(b => b.text || '').join('').trim();
      console.log('Text content:', text.substring(0, 400));

      const m = text.match(/\{[\s\S]*\}/);
      if (!m) throw new Error('Response had no JSON. Got: ' + text.substring(0, 200));

      render(JSON.parse(m[0]));

    } catch(e) {
      console.error(e);
      show('preview');
      const eb = document.getElementById('errBox');
      eb.textContent = 'Error: ' + e.message;
      eb.style.display = 'block';
    }
  });

  function render(r) {
    document.getElementById('rName').textContent = r.productName || 'Unknown';
    document.getElementById('rMfr').textContent = r.manufacturer || '';

    const conf = Math.min(100, Math.max(0, +r.confidence || 0));
    setTimeout(() => document.getElementById('confFill').style.width = conf + '%', 80);
    document.getElementById('confPct').textContent = conf + '%';

    const av = (r.availability || 'active').toLowerCase();
    const badge = document.getElementById('statusBadge');
    badge.className = 'status-badge ' + (av === 'discontinued' ? 'discontinued' : av === 'limited' ? 'limited' : 'active');
    badge.innerHTML = `<span class="status-dot"></span>${av === 'discontinued' ? 'Discontinued' : av === 'limited' ? 'Limited' : 'Available'}`;

    const grid = document.getElementById('infoGrid');
    grid.innerHTML = '';
    [['Color / Style', r.colorStyle], ['Type', r.shingleType], ['Material', r.material],
     ['Dimensions', r.dimensions], ['Warranty', r.warrantyOriginal], ['Weight / Square', r.weightPerSquare],
     ['Wind Rating', r.windRating], ['Fire Rating', r.fireRating], ['Where to Buy', r.whereToBuy],
     ['Disc. Year', r.discontinuedYear]
    ].forEach(([l, v]) => {
      if (!v || v === 'null') return;
      const d = document.createElement('div'); d.className = 'info-card';
      d.innerHTML = `<div class="info-label">${l}</div><div class="info-val">${v}</div>`;
      grid.appendChild(d);
    });

    const nc = document.getElementById('notesCard');
    if (r.fieldNotes) { document.getElementById('notesText').textContent = r.fieldNotes; nc.style.display = 'block'; }
    else nc.style.display = 'none';

    const ac = document.getElementById('altCard');
    const al = document.getElementById('altList');
    al.innerHTML = '';
    if (r.alternatives && r.alternatives.length) {
      r.alternatives.forEach(a => {
        const el = document.createElement('div'); el.className = 'alt-item';
        el.innerHTML = `<div class="alt-swatch" style="background:${a.colorHex||'#aaa'}"></div>
          <div><div class="alt-name">${a.productName} <span style="font-weight:400;color:var(--muted)">· ${a.manufacturer}</span></div>
          <div class="alt-reason">${a.reason}</div></div>
          <div class="alt-avail">${a.available ? 'In Stock' : 'Check avail.'}</div>`;
        al.appendChild(el);
      });
      ac.style.display = 'block';
    } else ac.style.display = 'none';

    show('results');
  }
</script>
</body>
</html>
